* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {

  --green: #34C759; --green-light: #E8F8ED; --red: #FF3B30; --orange: #FF9500;
  --gray: #8E8E93; --gray2: #C7C7CC; --gray3: #F2F2F7;
  --text: #000000; --text2: #3C3C43CC; --text3: #8E8E93;
  --separator: rgba(60,60,67,0.12);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
body { font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; min-height: 100vh; max-width: 428px; margin: 0 auto; }
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }

/* Identity */
#identity-page { justify-content: center; align-items: center; padding: 48px 24px; background: var(--card); min-height: 100vh; }
.identity-logo { width: 88px; height: 88px; background: linear-gradient(145deg,#007AFF,#5AC8FA); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 28px; box-shadow: 0 12px 32px rgba(0,122,255,0.28); }
.identity-title { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
.identity-sub { font-size: 15px; color: var(--text3); margin-bottom: 48px; line-height: 20px; }
.identity-cards { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.identity-card { background: var(--bg); border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform 0.15s var(--spring), background 0.15s; border: 2px solid transparent; min-height: 80px; }
.identity-card:active { transform: scale(0.96); opacity: 0.85; }
.identity-card.selected { border-color: var(--primary); background: var(--primary-light); }
.identity-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.avatar-re { background: linear-gradient(135deg,#FF9500,#FF6B00); }
.avatar-hc { background: linear-gradient(135deg,#AF52DE,#5E5CE6); }
.identity-info { flex: 1; }
.identity-name { font-size: 17px; font-weight: 600; line-height: 22px; }
.identity-desc { font-size: 13px; color: var(--text3); margin-top: 2px; line-height: 18px; }
.identity-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--gray2); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; transition: all 0.2s var(--spring); }
.identity-card.selected .identity-check { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }
.btn-confirm { width: 100%; margin-top: 32px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.15s var(--spring); min-height: 50px; }
.btn-confirm:disabled { opacity: 0.4; }
.btn-confirm:active:not(:disabled) { opacity: 0.85; transform: scale(0.97); }

/* Nav */
.nav-bar { background: rgba(255,255,255,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 0.5px solid var(--separator); padding: calc(var(--safe-top) + 10px) 16px 10px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; min-height: 44px; }
.nav-title { font-size: 17px; font-weight: 600; line-height: 22px; }
.nav-date { font-size: 13px; color: var(--text3); line-height: 18px; margin-top: 1px; }
.nav-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; background: var(--bg); transition: transform 0.15s var(--spring), opacity 0.15s; }
.nav-avatar:active { transform: scale(0.9); opacity: 0.7; }

/* Tab Bar */
.tab-bar { background: rgba(255,255,255,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid var(--separator); padding: 6px 0 calc(var(--safe-bottom) + 6px); display: flex; position: sticky; bottom: 0; z-index: 100; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; color: var(--gray); transition: color 0.15s; min-height: 49px; justify-content: center; }
.tab-item.active { color: var(--primary); }
.tab-icon { font-size: 24px; line-height: 1; transition: transform 0.2s var(--spring); }
.tab-item.active .tab-icon { transform: scale(1.1); }
.tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1px; }

/* Scroll */
.scroll-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 32px; -webkit-overflow-scrolling: touch; }

/* Progress Card */
.progress-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.progress-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.progress-label { font-size: 15px; font-weight: 600; color: var(--text); line-height: 20px; }
.progress-pct { font-size: 34px; font-weight: 700; color: var(--green); letter-spacing: -0.3px; line-height: 1; }
.progress-count { font-size: 13px; color: var(--text3); margin-top: 2px; text-align: right; }
.progress-bar-bg { height: 8px; background: var(--gray3); border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg,#34C759,#30D158); border-radius: 4px; transition: width 0.5s var(--spring); }

/* Section */
.section { margin-bottom: 24px; }
.section-header { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; margin-bottom: 8px; line-height: 18px; }
.card-list { background: var(--card); border-radius: 12px; overflow: hidden; }

/* Task Item */
.task-item { display: flex; align-items: center; padding: 13px 16px; gap: 14px; cursor: pointer; transition: background 0.1s; position: relative; min-height: 56px; }
.task-item:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 58px; right: 0; height: 0.5px; background: var(--separator); }
.task-item:active { background: var(--gray3); }
.task-item.done { opacity: 0.45; }
.task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--gray2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s var(--spring); font-size: 13px; font-weight: 700; color: white; }
.task-item.done .task-check { background: var(--green); border-color: var(--green); transform: scale(1.05); }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 15px; font-weight: 500; line-height: 20px; color: var(--text); }
.task-item.done .task-name { text-decoration: line-through; color: var(--text3); }
.task-sub { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 16px; }
.task-owner { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; line-height: 16px; }
.owner-re { background: #FFF3E0; color: #BF5000; }
.owner-hc { background: #F3E5F5; color: #7B1FA2; }

/* History */
.history-item { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.history-date { font-size: 13px; font-weight: 600; color: var(--text3); margin-bottom: 12px; line-height: 18px; }
.history-stats { display: flex; gap: 10px; }
.history-stat { flex: 1; background: var(--bg); border-radius: 10px; padding: 12px 10px; text-align: center; }
.history-stat-num { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; line-height: 1; }
.history-stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 13px; }
.stat-re .history-stat-num { color: #BF5000; }
.stat-hc .history-stat-num { color: #7B1FA2; }
.history-tasks { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 4px; }
.history-task-chip { font-size: 12px; padding: 4px 10px; border-radius: 8px; background: var(--green-light); color: #1B5E20; line-height: 16px; }

/* Empty */
.empty-state { text-align: center; padding: 64px 32px; color: var(--text3); }
.empty-icon { font-size: 52px; margin-bottom: 14px; }
.empty-text { font-size: 15px; line-height: 20px; }

/* Toast */
.toast { position: fixed; bottom: calc(var(--safe-bottom) + 88px); left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(0,0,0,0.78); color: white; padding: 11px 22px; border-radius: 22px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.25s, transform 0.25s var(--spring); white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Week badge */
.week-badge { display: inline-flex; align-items: center; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; line-height: 16px; }
</style>

function getWeekNumber(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
  return Math.floor((mon - WEEK1_MONDAY) / (7*86400000));
}
function getEffectiveOwner(task, date) {
  const flip = getWeekNumber(date) % 2 !== 0;

}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function renderTasks() {
  const today = new Date();
  const myTasks = TASKS.filter(t => getEffectiveOwner(t, today) === currentUser);
  let done = 0;
  myTasks.forEach(t => { if ((todayChecks[t.id]||{})[currentUser]) done++; });
  document.getElementById('progress-count').textContent = done + ' / ' + myTasks.length;
  const pct = myTasks.length ? Math.round(done/myTasks.length*100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const cats = {};
  myTasks.forEach(t => { if (!cats[t.cat]) cats[t.cat]=[]; cats[t.cat].push(t); });

  const container = document.getElementById('task-sections');
  container.innerHTML = '';

  Object.entries(cats).forEach(([cat, tasks]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = cat;
    sec.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'card-list';

    tasks.forEach(t => {
      const isDone = !!(todayChecks[t.id]||{})[currentUser];
      const item = document.createElement('div');
      item.className = 'task-item' + (isDone ? ' done' : '');

      const chk = document.createElement('div');
      chk.className = 'task-check';
      chk.textContent = isDone ? '✓' : '';

      const body = document.createElement('div');
      body.className = 'task-body';
      const nm = document.createElement('div');
      nm.className = 'task-name';
      nm.textContent = t.name;
      body.appendChild(nm);
      if (t.sub) {
        const sb = document.createElement('div');
        sb.className = 'task-sub';
        sb.textContent = t.sub;
        body.appendChild(sb);
      }

      const ow = document.createElement('div');
      ow.className = 'task-owner owner-' + currentUser;
      ow.textContent = currentUser;

      item.appendChild(chk);
      item.appendChild(body);
      item.appendChild(ow);

      const taskId = t.id;
      item.addEventListener('click', async function() {
        const key = dateKey(new Date());
        const cur = (todayChecks[taskId]||{})[currentUser] || false;
        if (!todayChecks[taskId]) todayChecks[taskId] = {};
        todayChecks[taskId][currentUser] = !cur;
        renderTasks();
        showToast(!cur ? '已完成 ✓' : '已取消');
        if (!db) return;
        try {
          const upd = {};
          upd['checks/' + key + '/' + taskId + '/' + currentUser] = !cur;
          await update(ref(db), upd);
        } catch(e) {
          todayChecks[taskId][currentUser] = cur;
          renderTasks();
          showToast('同步失败，请检查网络');
        }
      });

      list.appendChild(item);
    });
    sec.appendChild(list);
    container.appendChild(sec);
  });
}

function updateNavInfo() {
  const today = new Date();
  const week = getWeekNumber(today) + 1;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('nav-date').textContent = (today.getMonth()+1) + '月' + today.getDate() + '日 周' + days[today.getDay()];
  document.getElementById('history-nav-date').textContent = (today.getMonth()+1) + '月' + today.getDate() + '日';
  document.getElementById('week-badge').textContent = '第' + week + '周';
  const emoji = currentUser === 're' ? '🌸' : '⚡';
  document.getElementById('nav-avatar').textContent = emoji;
  document.getElementById('history-avatar').textContent = emoji;
}

function subscribeToday() {
  if (!db) { renderTasks(); return; }
  if (unsubFirebase) unsubFirebase();
  unsubFirebase = onValue(ref(db, 'checks/' + dateKey(new Date())), snap => {
    todayChecks = snap.val() || {};
    renderTasks();
  }, err => { console.error(err); renderTasks(); });
}

async function loadHistory() {
  const container = document.getElementById('history-list');
  container.innerHTML = '<div class="empty-state"><div class="empty-text">加载中...</div></div>';
  if (!db) { container.innerHTML = '<div class="empty-state"><div class="empty-text">无法连接数据库</div></div>'; return; }
  const snap = await get(ref(db, 'checks'));
  const allData = snap.val() || {};
  const today = dateKey(new Date());
  const dates = Object.keys(allData).filter(d => d !== today).sort((a,b) => b.localeCompare(a)).slice(0,30);
  container.innerHTML = '';
  if (!dates.length) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无历史记录</div></div>'; return; }
  const days = ['日','一','二','三','四','五','六'];
  dates.forEach(dateStr => {
    const checks = allData[dateStr];
    const d = new Date(dateStr + 'T00:00:00');
    const week = getWeekNumber(d) + 1;
    let reCount=0, hcCount=0; const reDone=[], hcDone=[];
    TASKS.forEach(t => {
      const owner = getEffectiveOwner(t, d);
      const isDone = !!(checks[t.id]||{})[owner];
      if (owner==='re') { if(isDone){reCount++;reDone.push(t.name);} }
      else { if(isDone){hcCount++;hcDone.push(t.name);} }
    });
    const item = document.createElement('div');
    item.className = 'history-item';
    const allDone = [...reDone,...hcDone];
    item.innerHTML =
      '<div class="history-date">' + (d.getMonth()+1) + '月' + d.getDate() + '日 周' + days[d.getDay()] + ' · 第' + week + '周</div>' +
      '<div class="history-stats">' +
        '<div class="history-stat stat-re"><div class="history-stat-num">' + reCount + '</div><div class="history-stat-label">🌸 re 完成</div></div>' +
        '<div class="history-stat stat-hc"><div class="history-stat-num">' + hcCount + '</div><div class="history-stat-label">⚡ hc 完成</div></div>' +
      '</div>' +
      (allDone.length ? '<div class="history-tasks">' + allDone.map(n=>'<span class="history-task-chip">'+n+'</span>').join('') + '</div>' : '');
    container.appendChild(item);
  });
}

function switchTab(tab) {
  if (tab === 'main') {
    showPage('main-page');
    document.getElementById('tab-main').classList.add('active');
    document.getElementById('tab-history').classList.remove('active');
  } else {
    showPage('history-page');
    document.getElementById('tab-main2').classList.remove('active');
    document.getElementById('tab-history2').classList.add('active');
    loadHistory();
  }
}

function showMainPage() {
  showPage('main-page');
  updateNavInfo();
  subscribeToday();
  document.getElementById('tab-main').classList.add('active');
  document.getElementById('tab-history').classList.remove('active');
}

// Bind events
document.getElementById('card-re').addEventListener('click', function() {
  document.querySelectorAll('.identity-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.identity-check').forEach(c => c.textContent = '');
  document.getElementById('card-re').classList.add('selected');
  document.getElementById('check-re').textContent = '✓';
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('btn-confirm').dataset.selected = 're';
});
document.getElementById('card-hc').addEventListener('click', function() {
  document.querySelectorAll('.identity-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.identity-check').forEach(c => c.textContent = '');
  document.getElementById('card-hc').classList.add('selected');
  document.getElementById('check-hc').textContent = '✓';
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('btn-confirm').dataset.selected = 'hc';
});
document.getElementById('btn-confirm').addEventListener('click', function() {
  const id = document.getElementById('btn-confirm').dataset.selected;
  if (!id) return;
  currentUser = id;
  localStorage.setItem('familyUser', id);
  showMainPage();
});
document.getElementById('nav-avatar').addEventListener('click', function() {
  if (confirm('切换身份？当前身份：' + currentUser)) {
    localStorage.removeItem('familyUser');
    currentUser = null;
    if (unsubFirebase) unsubFirebase();
    showPage('identity-page');
  }
});
document.getElementById('tab-main').addEventListener('click', function() { switchTab('main'); });
document.getElementById('tab-history').addEventListener('click', function() { switchTab('history'); });
document.getElementById('tab-main2').addEventListener('click', function() { switchTab('main'); });
document.getElementById('tab-history2').addEventListener('click', function() { switchTab('history'); });

if (currentUser) { showMainPage(); } else { showPage('identity-page'); }
</script>
</body>
