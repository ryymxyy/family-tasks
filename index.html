<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>家务打卡</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --primary: #007AFF;
    --primary-light: #E8F3FF;
    --green: #34C759;
    --green-light: #E8F8ED;
    --red: #FF3B30;
    --gray: #8E8E93;
    --gray2: #C7C7CC;
    --gray3: #F2F2F7;
    --text: #000000;
    --text2: #3C3C43;
    --text3: #8E8E93;
    --separator: rgba(60,60,67,0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- Layout ---- */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  .page { display: none; flex: 1; flex-direction: column; }
  .page.active { display: flex; }

  /* ---- Identity Screen ---- */
  #identity-page {
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    background: var(--card);
  }

  .identity-logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #007AFF, #5AC8FA);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px rgba(0,122,255,0.3);
  }

  .identity-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .identity-sub { font-size: 15px; color: var(--text3); margin-bottom: 48px; }

  .identity-cards { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .identity-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    border: 2px solid transparent;
  }
  .identity-card:active { transform: scale(0.97); }
  .identity-card.selected { border-color: var(--primary); background: var(--primary-light); }

  .identity-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .avatar-re { background: linear-gradient(135deg, #FF9500, #FF6B00); }
  .avatar-hc { background: linear-gradient(135deg, #AF52DE, #5E5CE6); }

  .identity-info { flex: 1; }
  .identity-name { font-size: 17px; font-weight: 600; }
  .identity-desc { font-size: 13px; color: var(--text3); margin-top: 2px; }

  .identity-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--gray2);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 13px;
  }
  .identity-card.selected .identity-check {
    background: var(--primary);
    border-color: var(--primary);
  }

  .btn-confirm {
    width: 100%;
    margin-top: 32px;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .btn-confirm:disabled { opacity: 0.4; }
  .btn-confirm:active:not(:disabled) { opacity: 0.8; }

  /* ---- Nav Bar ---- */
  .nav-bar {
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .nav-title { font-size: 17px; font-weight: 600; }
  .nav-date { font-size: 13px; color: var(--text3); }

  .nav-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
  }

  /* ---- Tab Bar ---- */
  .tab-bar {
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--separator);
    padding: 8px 0 calc(var(--safe-bottom) + 8px);
    display: flex;
    position: sticky; bottom: 0; z-index: 100;
  }

  .tab-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer;
    padding: 4px 0;
    color: var(--gray);
    transition: color 0.15s;
  }
  .tab-item.active { color: var(--primary); }
  .tab-icon { font-size: 22px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; }

  /* ---- Scroll Content ---- */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 24px;
    -webkit-overflow-scrolling: touch;
  }

  /* ---- Section ---- */
  .section { margin-bottom: 24px; }
  .section-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .card-list {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
  }

  /* ---- Task Item ---- */
  .task-item {
    display: flex; align-items: center;
    padding: 12px 16px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .task-item:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 60px; right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .task-item:active { background: var(--gray3); }
  .task-item.done { opacity: 0.5; }

  .task-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--gray2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    color: white;
  }
  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
  }

  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
  }
  .task-item.done .task-name { text-decoration: line-through; color: var(--text3); }
  .task-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-owner {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .owner-re { background: #FFF3E0; color: #E65100; }
  .owner-hc { background: #F3E5F5; color: #6A1B9A; }

  /* ---- Progress Bar ---- */
  .progress-card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 15px; font-weight: 600; }
  .progress-count { font-size: 13px; color: var(--text3); }
  .progress-bar-bg {
    height: 6px;
    background: var(--gray3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ---- History Page ---- */
  .history-item {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .history-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .history-stats {
    display: flex; gap: 12px;
  }
  .history-stat {
    flex: 1;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .history-stat-num { font-size: 22px; font-weight: 700; }
  .history-stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .stat-re .history-stat-num { color: #E65100; }
  .stat-hc .history-stat-num { color: #6A1B9A; }

  .history-tasks { margin-top: 10px; }
  .history-task-chip {
    display: inline-block;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
    margin: 2px;
    background: var(--green-light);
    color: #1B5E20;
  }

  /* ---- Empty State ---- */
  .empty-state {
    text-align: center;
    padding: 60px 32px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 80px);
    left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ---- Week badge ---- */
  .week-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
</style>
</head>

// ---- Week Rotation ----
// Week 1 anchor: 2026-04-13 (Monday). Every Monday after that flips owners.
const WEEK1_MONDAY = new Date('2026-04-13T00:00:00');

function getWeekNumber(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // rewind to Monday
  const diff = monday - WEEK1_MONDAY;
  return Math.floor(diff / (7 * 86400000)); // 0-indexed weeks since anchor
}

function getEffectiveOwner(task, date) {
  const weekNum = getWeekNumber(date);
  const flip = weekNum % 2 !== 0; // week 0 = original, week 1 = flipped, etc.
  if (!flip) return task.owner;
  return task.owner === 're' ? 'hc' : 're';
}

function dateKey(date) {
  return date.toISOString().slice(0, 10);
}

// ---- State ----
let currentUser = localStorage.getItem('familyUser') || null;
let todayChecks = {}; // { taskId: { re: bool, hc: bool } }
let unsubscribe = null;

// ---- Init ----
window.selectIdentity = function(id) {
  document.querySelectorAll('.identity-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.identity-check').forEach(c => c.textContent = '');
  document.getElementById('card-' + id).classList.add('selected');
  document.getElementById('check-' + id).textContent = '✓';
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('btn-confirm').dataset.selected = id;
};

window.confirmIdentity = function() {
  const id = document.getElementById('btn-confirm').dataset.selected;
  if (!id) return;
  currentUser = id;
  localStorage.setItem('familyUser', id);
  showMainPage();
};

// Auto-login if saved
if (currentUser) {
  showMainPage();
} else {
  showPage('identity-page');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMainPage() {
  showPage('main-page');
  updateNavInfo();
  subscribeToday();
  switchTab('main');
}

function updateNavInfo() {
  const today = new Date();
  const week = getWeekNumber(today) + 1;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('nav-date').textContent =
    `${today.getMonth()+1}月${today.getDate()}日 周${days[today.getDay()]}`;
  document.getElementById('history-nav-date').textContent =
    `${today.getMonth()+1}月${today.getDate()}日`;
  document.getElementById('week-badge').textContent = `第${week}周`;
  const avatarEmoji = currentUser === 're' ? '🌸' : '⚡';
  document.getElementById('nav-avatar').textContent = avatarEmoji;
  document.getElementById('history-avatar').textContent = avatarEmoji;
}

// ---- Firebase Sync ----
function subscribeToday() {
  const key = dateKey(new Date());
  const r = ref(db, 'checks/' + key);
  if (unsubscribe) unsubscribe();
  unsubscribe = onValue(r, snap => {
    todayChecks = snap.val() || {};
    renderTasks();
  });
}

window.toggleTask = async function(taskId) {
  const key = dateKey(new Date());
  const cur = (todayChecks[taskId] || {})[currentUser] || false;
  const updates = {};
  updates[`checks/${key}/${taskId}/${currentUser}`] = !cur;
  await update(ref(db), updates);
  showToast(!cur ? '已完成 ✓' : '已取消');
};

// ---- Render Tasks ----
function renderTasks() {
  const today = new Date();
  const myTasks = TASKS.filter(t => getEffectiveOwner(t, today) === currentUser);

  let done = 0;
  myTasks.forEach(t => {
    if ((todayChecks[t.id] || {})[currentUser]) done++;
  });

  document.getElementById('progress-count').textContent = `${done} / ${myTasks.length}`;
  const pct = myTasks.length ? Math.round(done / myTasks.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Group by category
  const cats = {};
  myTasks.forEach(t => {
    if (!cats[t.cat]) cats[t.cat] = [];
    cats[t.cat].push(t);
  });

  const container = document.getElementById('task-sections');
  container.innerHTML = '';

  Object.entries(cats).forEach(([cat, tasks]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-header">${cat}</div>`;
    const list = document.createElement('div');
    list.className = 'card-list';
    tasks.forEach(t => {
      const isDone = !!(todayChecks[t.id] || {})[currentUser];
      const item = document.createElement('div');
      item.className = 'task-item' + (isDone ? ' done' : '');
      item.onclick = () => toggleTask(t.id);
      item.innerHTML = `
        <div class="task-check">${isDone ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-name">${t.name}</div>
          ${t.sub ? `<div class="task-sub">${t.sub}</div>` : ''}
        </div>
        <div class="task-owner owner-${currentUser}">${currentUser}</div>
      `;
      list.appendChild(item);
    });
    sec.appendChild(list);
    container.appendChild(sec);
  });
}

// ---- History ----
async function loadHistory() {
  const histSnap = await get(ref(db, 'checks'));
  const allData = histSnap.val() || {};
  const today = dateKey(new Date());

  const dates = Object.keys(allData)
    .filter(d => d !== today)
    .sort((a, b) => b.localeCompare(a))
    .slice(0, 30);

  const container = document.getElementById('history-list');
  container.innerHTML = '';

  if (dates.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无历史记录</div></div>`;
    return;
  }

  dates.forEach(dateStr => {
    const checks = allData[dateStr];
    const d = new Date(dateStr + 'T00:00:00');
    const week = getWeekNumber(d) + 1;
    const days = ['日','一','二','三','四','五','六'];

    let reCount = 0, hcCount = 0;
    const reDone = [], hcDone = [];

    TASKS.forEach(t => {
      const owner = getEffectiveOwner(t, d);
      const isDone = !!(checks[t.id] || {})[owner];
      if (owner === 're') { if (isDone) { reCount++; reDone.push(t.name); } }
      else { if (isDone) { hcCount++; hcDone.push(t.name); } }
    });

    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-date">${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]} · 第${week}周</div>
      <div class="history-stats">
        <div class="history-stat stat-re">
          <div class="history-stat-num">${reCount}</div>
          <div class="history-stat-label">🌸 re 完成</div>
        </div>
        <div class="history-stat stat-hc">
          <div class="history-stat-num">${hcCount}</div>
          <div class="history-stat-label">⚡ hc 完成</div>
        </div>
      </div>
      ${(reDone.length + hcDone.length) > 0 ? `
      <div class="history-tasks">
        ${[...reDone, ...hcDone].map(n => `<span class="history-task-chip">${n}</span>`).join('')}
      </div>` : ''}
    `;
    container.appendChild(item);
  });
}

// ---- Tab Switch ----
window.switchTab = function(tab) {
  if (tab === 'main') {
    showPage('main-page');
    document.getElementById('tab-main').classList.add('active');
    document.getElementById('tab-history').classList.remove('active');
  } else {
    showPage('history-page');
    document.getElementById('tab-main2').classList.remove('active');
    document.getElementById('tab-history2').classList.add('active');
    loadHistory();
  }
};

// ---- Switch User ----
window.switchUser = function() {
  if (confirm('切换身份？当前身份：' + currentUser)) {
    localStorage.removeItem('familyUser');
    currentUser = null;
    if (unsubscribe) unsubscribe();
    showPage('identity-page');
  }
};

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

window.showToast = showToast;
</script>
